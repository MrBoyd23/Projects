#ansible-playbook --ask-vault-pass -i inventory.ini -K playbooks/vm_services/mintdns_service.yml
- name: MINTDNS CURRENT SERVICES STATUS
  hosts: MintDNS
  gather_facts: false
  become: true
  serial: 1
  vars_files:
    - ../../.secrets/secret_vars.yml
  vars:
    managed_services:
      - accounts-daemon.service
      - acpid.service
      - avahi-daemon.service
      - colord.service
      - containerd.service
      - cron.service
      - cups-browsed.service
      - cups.service
      - dbus.service
      - docker.service
      - haveged.service
      - irqbalance.service
      - kerneloops.service
      - ModemManager.service
      - networkd-dispatcher.service
      - NetworkManager.service
      - nmbd.service
      - packagekit.service
      - polkit.service
      - rsyslog.service
      - rtkit-daemon.service
      - sddm.service
      - smbd.service
      - snapd.service
      - ssh.service
      - systemd-journald.service
      - systemd-logind.service
      - systemd-resolved.service
      - systemd-timesyncd.service
      - systemd-udevd.service
      - udisks2.service
      - unattended-upgrades.service
      - upower.service
      - user@1000.service
      - wpa_supplicant.service

  tasks:
    - name: CHECK STATUS OF SPECIFIED SERVICES
      command: systemctl status "{{ item }}"
      loop: "{{ managed_services }}"
      register: service_status
      failed_when: false
      changed_when: false

    - name: DEBUG SERVICE STATUS
      debug:
        msg: "Service {{ item.item }} status: {{ item.stdout }}"
      loop: "{{ service_status.results }}"
      when: item.stdout is defined

    - name: START SERVICES THAT ARE NOT RUNNING
      command: systemctl start "{{ item.item }}"
      loop: "{{ service_status.results }}"
      when: '"inactive" in item.stdout or "dead" in item.stdout'
      register: start_result
      failed_when: false
      changed_when: true

    - name: DISPLAY SERVICE STATUS AFTER CHECKING AND STARTING/RESTARTING
      debug:
        var: service_status.results
