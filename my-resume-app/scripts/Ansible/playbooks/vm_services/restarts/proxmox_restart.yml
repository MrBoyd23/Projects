#ansible-playbook --ask-vault-pass -i inventory.ini -K playbooks/vm_services/restarts/proxmox_restart.yml
- name: PROXMOX RESTART SERVICES
  hosts: Prox
  gather_facts: false
  become: true
  serial: 1
  vars_files:
    - ../../../.secrets/secret_vars.yml
  vars:
    managed_services:
      - cron.service
      - dbus.service
      - dm-event.service
      - getty@tty1.service
      - ksmtuned.service
      - lxc-monitord.service
      - lxcfs.service
      - postfix@-.service
      - pve-cluster.service
      - pve-firewall.service
      - pve-ha-crm.service
      - pve-ha-lrm.service
      - pve-lxc-syscalld.service
      - pvedaemon.service
      - pvefw-logger.service
      - pveproxy.service
      - pvescheduler.service
      - pvestatd.service
      - qmeventd.service
      - rpcbind.service
      - rrdcached.service
      - smartmontools.service
      - spiceproxy.service
      - ssh.service
      - systemd-journald.service
      - systemd-logind.service
      - systemd-timesyncd.service
      - systemd-udevd.service
      - user@0.service
      - watchdog-mux.service
      - zfs-zed.service

  tasks:
    - name: RESTART SPECIFIED SERVICES
      command: systemctl restart "{{ item }}"
      loop: "{{ managed_services }}"
      register: restart_result
      failed_when: false
      changed_when: true

    - name: DEBUG RESTART RESULTS
      debug:
        msg: "Service {{ item.item }} restart result: {{ item.stdout }}"
      loop: "{{ restart_result.results }}"
      when: item.stdout is defined

