server {
    listen 3500;
    server_name localhost resume.brandonaboyd.com;

    root /home/flossmore/Sites/Resume/build;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # API — proxy to Express backend (port 5000)
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Resume download — serve the static file directly, never SPA fallback
    location = /Brandon_Boyd_Resume.docx {
        try_files $uri =404;
        add_header Content-Disposition 'attachment; filename="Brandon_Boyd_Resume.docx"';
        add_header Content-Type 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
    }

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (CRA hashes filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache fonts, images, favicon
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Don't cache the HTML shell (it references hashed JS/CSS)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
